<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>代理店ポータル | ANKEN MGR</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;600;700&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #f8f9fb;
  --bg2: #ffffff;
  --bg3: #f0f2f5;
  --sidebar: #0f1729;
  --sidebar2: #1a2440;
  --border: #e2e6ed;
  --accent: #2563eb;
  --accent2: #059669;
  --danger: #ef4444;
  --warn: #f59e0b;
  --purple: #7c3aed;
  --cyan: #0891b2;
  --text: #1e2a3a;
  --text2: #64748b;
  --text3: #94a3b8;
  --shadow: 0 1px 3px rgba(0,0,0,.06), 0 1px 2px rgba(0,0,0,.04);
  --shadow-md: 0 4px 12px rgba(0,0,0,.08);
  --radius: 10px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--bg); color: var(--text); font-family: 'Noto Sans JP', sans-serif; font-size: 13px; min-height: 100vh; }

/* ===== LAYOUT ===== */
.layout { display: flex; height: 100vh; overflow: hidden; }
.sidebar { width: 240px; background: var(--sidebar); display: flex; flex-direction: column; flex-shrink: 0; }
.main { flex: 1; overflow-y: auto; background: var(--bg); }

/* ===== SIDEBAR ===== */
.logo { padding: 24px 20px 20px; border-bottom: 1px solid rgba(255,255,255,.06); }
.logo-mark { font-family: 'DM Sans', sans-serif; font-size: 10px; font-weight: 600; letter-spacing: 3px; color: var(--accent); text-transform: uppercase; }
.logo-name { font-size: 16px; font-weight: 700; color: #fff; letter-spacing: .3px; margin-top: 2px; }
.logo-ver { font-size: 10px; color: rgba(255,255,255,.25); margin-top: 2px; }

.nav { padding: 16px 0; flex: 1; }
.nav-section { padding: 12px 20px 6px; font-size: 9px; font-weight: 600; letter-spacing: 1.5px; color: rgba(255,255,255,.2); text-transform: uppercase; }
.nav-item { display: flex; align-items: center; gap: 10px; padding: 10px 20px; cursor: pointer; color: rgba(255,255,255,.5); font-size: 13px; font-weight: 500; transition: all .15s; border-left: 3px solid transparent; }
.nav-item:hover { color: rgba(255,255,255,.85); background: rgba(255,255,255,.05); }
.nav-item.active { color: #fff; background: rgba(37,99,235,.2); border-left-color: var(--accent); }
.nav-icon { width: 20px; text-align: center; font-size: 15px; }

.sidebar-footer { padding: 16px 20px; border-top: 1px solid rgba(255,255,255,.06); }
.sidebar-footer .agent-name { font-size: 13px; font-weight: 600; color: #e2e8f0; }
.sidebar-footer .agent-no { font-size: 11px; color: rgba(255,255,255,.3); margin-top: 2px; }
.sidebar-footer a { color: #94a3b8; font-size: 11px; text-decoration: none; margin-top: 6px; display: inline-block; }
.sidebar-footer a:hover { color: #fff; }

/* ===== HEADER ===== */
.page-header { background: var(--bg2); border-bottom: 1px solid var(--border); padding: 16px 28px; display: flex; align-items: center; justify-content: space-between; box-shadow: var(--shadow); position: sticky; top: 0; z-index: 10; }
.page-title { font-size: 18px; font-weight: 700; color: var(--text); letter-spacing: -.2px; }
.page-title span { color: var(--accent); }
.header-actions { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }

/* ===== BUTTONS ===== */
.btn { padding: 8px 16px; border: none; border-radius: 7px; cursor: pointer; font-size: 12px; font-family: 'Noto Sans JP', sans-serif; font-weight: 600; transition: all .15s; display: inline-flex; align-items: center; gap: 6px; white-space: nowrap; }
.btn-primary { background: var(--accent); color: #fff; box-shadow: 0 2px 6px rgba(37,99,235,.3); }
.btn-primary:hover { background: #1d4ed8; transform: translateY(-1px); }
.btn-ghost { background: var(--bg3); color: var(--text2); border: 1px solid var(--border); }
.btn-ghost:hover { background: var(--border); color: var(--text); }
.btn-sm { padding: 5px 10px; font-size: 11px; }

/* ===== STATS ===== */
.stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; padding: 16px 28px 0; }
.stat-card { background: var(--bg2); border-radius: var(--radius); padding: 14px 16px; box-shadow: var(--shadow); border: 1px solid var(--border); position: relative; overflow: hidden; }
.stat-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px; }
.stat-card.blue::before { background: var(--accent); }
.stat-card.green::before { background: var(--accent2); }
.stat-card.warn::before { background: var(--warn); }
.stat-card.purple::before { background: var(--purple); }
.stat-label { font-size: 10px; color: var(--text3); font-weight: 600; letter-spacing: .5px; text-transform: uppercase; }
.stat-value { font-family: 'DM Sans', sans-serif; font-size: 24px; font-weight: 700; color: var(--text); margin-top: 2px; line-height: 1; }
.stat-sub { font-size: 10px; color: var(--text3); margin-top: 4px; }
.stat-card.blue .stat-value { color: var(--accent); }
.stat-card.green .stat-value { color: var(--accent2); }
.stat-card.warn .stat-value { color: var(--warn); }
.stat-card.purple .stat-value { color: var(--purple); }

/* ===== FILTER ===== */
.filter-bar { padding: 12px 28px 0; display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
.search-wrap { position: relative; flex: 1; min-width: 200px; }
.search-wrap input { width: 100%; background: var(--bg2); border: 1px solid var(--border); border-radius: 8px; padding: 9px 14px 9px 36px; color: var(--text); font-size: 13px; font-family: inherit; outline: none; transition: border-color .15s; box-shadow: var(--shadow); }
.search-wrap input:focus { border-color: var(--accent); }
.search-icon { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: var(--text3); font-size: 14px; pointer-events: none; }

.status-scroll { display: flex; gap: 6px; flex-wrap: wrap; padding: 10px 28px 0; }
.status-chip { padding: 5px 12px; border-radius: 20px; border: 1px solid var(--border); background: var(--bg2); color: var(--text2); cursor: pointer; font-size: 11px; font-weight: 600; white-space: nowrap; transition: all .15s; font-family: inherit; }
.status-chip:hover { border-color: var(--accent); color: var(--accent); }
.status-chip.active { background: var(--accent); color: #fff; border-color: var(--accent); }

/* ===== TABLE ===== */
.table-wrap { padding: 12px 28px 20px; }
.table-container { background: var(--bg2); border-radius: 12px; box-shadow: var(--shadow); border: 1px solid var(--border); overflow: auto; -webkit-overflow-scrolling: touch; }
table { width: max-content; min-width: 100%; border-collapse: collapse; }
thead { background: var(--bg3); position: sticky; top: 0; z-index: 2; }
th { text-align: left; padding: 11px 14px; font-size: 10px; color: var(--text3); font-weight: 700; letter-spacing: .8px; text-transform: uppercase; border-bottom: 1px solid var(--border); white-space: nowrap; }
td { padding: 12px 14px; border-bottom: 1px solid var(--border); vertical-align: middle; font-size: 13px; }
tr:last-child td { border-bottom: none; }
tbody tr { cursor: pointer; transition: background .1s; }
tbody tr:hover td { background: #f0f5ff; }
.td-main { font-weight: 600; color: var(--text); max-width: 200px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.td-sub { color: var(--text2); font-size: 12px; }
.td-amount { font-family: 'DM Sans', sans-serif; font-size: 14px; font-weight: 600; color: var(--text); }
.td-date { color: var(--text2); font-size: 12px; white-space: nowrap; }

/* ===== BADGES ===== */
.badge { display: inline-flex; align-items: center; padding: 3px 9px; border-radius: 20px; font-size: 11px; font-weight: 600; white-space: nowrap; }
.b-green { background: #dcfce7; color: #15803d; }
.b-blue { background: #dbeafe; color: #1d4ed8; }
.b-yellow { background: #fef3c7; color: #b45309; }
.b-orange { background: #ffedd5; color: #c2410c; }
.b-red { background: #fee2e2; color: #b91c1c; }
.b-gray { background: #f1f5f9; color: #475569; }
.b-purple { background: #ede9fe; color: #6d28d9; }
.b-cyan { background: #cffafe; color: #0e7490; }

.type-pill { display: inline-flex; align-items: center; gap: 4px; padding: 2px 8px; border-radius: 5px; font-size: 10px; font-weight: 700; }
.tp-koji { background: #fff7ed; color: #c2410c; }
.tp-hoshu { background: #f0fdf4; color: #15803d; }
.tp-sodan { background: #eff6ff; color: #1d4ed8; }
.tp-stooory { background: #fdf4ff; color: #7e22ce; }

/* ===== EMPTY ===== */
.empty-state { text-align: center; padding: 60px 20px; color: var(--text3); }
.empty-icon { font-size: 40px; margin-bottom: 12px; }
.empty-text { font-size: 14px; }

/* ===== DETAIL PANEL ===== */
.detail-panel { display: none; position: fixed; right: 0; top: 0; bottom: 0; width: 560px; background: var(--bg2); border-left: 1px solid var(--border); z-index: 50; overflow-y: auto; box-shadow: -4px 0 24px rgba(0,0,0,.1); }
.detail-panel.open { display: block; }
.detail-hd { padding: 18px 22px; border-bottom: 1px solid var(--border); position: sticky; top: 0; background: var(--bg2); z-index: 1; display: flex; justify-content: space-between; align-items: center; }
.detail-name { font-size: 17px; font-weight: 700; color: var(--text); }
.close-btn { width: 32px; height: 32px; border: 1px solid var(--border); border-radius: 8px; background: var(--bg3); color: var(--text2); cursor: pointer; font-size: 16px; display: flex; align-items: center; justify-content: center; transition: all .15s; }
.close-btn:hover { background: var(--border); color: var(--text); }

.detail-section { padding: 14px 22px; border-bottom: 1px solid var(--border); }
.detail-section-title { font-size: 10px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; color: var(--text3); margin-bottom: 10px; }
.detail-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.detail-item { background: var(--bg3); border-radius: 6px; padding: 8px 12px; }
.detail-item.full { grid-column: 1/-1; }
.detail-label { font-size: 10px; color: var(--text3); font-weight: 600; margin-bottom: 3px; }
.detail-value { font-size: 13px; color: var(--text); font-weight: 500; word-break: break-all; }

/* ===== 手数料明細 ===== */
.meisai-card { background: var(--bg2); border-radius: 12px; border: 1px solid var(--border); box-shadow: var(--shadow); margin: 16px 28px; overflow: hidden; }
.meisai-header { padding: 16px 20px; background: var(--bg3); border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
.meisai-title { font-size: 14px; font-weight: 700; color: var(--text); }
.meisai-table { width: 100%; border-collapse: collapse; }
.meisai-table th { background: var(--bg3); padding: 8px 6px; font-size: 9px; color: var(--text3); font-weight: 700; letter-spacing: .5px; text-transform: uppercase; border-bottom: 1px solid var(--border); text-align: left; white-space: nowrap; }
.meisai-table td { padding: 6px; border-bottom: 1px solid var(--border); font-size: 10px; white-space: nowrap; }
@media print {
  .meisai-table { font-size: 8px; }
  .meisai-table th { font-size: 7px; padding: 4px 3px; }
  .meisai-table td { font-size: 8px; padding: 4px 3px; white-space: normal; word-break: break-all; }
}
.meisai-table tr:last-child td { border-bottom: none; }
.meisai-table .total-row { background: #f0f5ff; font-weight: 700; }
.meisai-table .total-row td { color: var(--accent); font-size: 14px; }
.meisai-summary { padding: 16px 20px; background: linear-gradient(135deg, #eff6ff, #f0fdf4); display: flex; gap: 24px; align-items: center; flex-wrap: wrap; }
.meisai-summary-item { }
.meisai-summary-label { font-size: 10px; color: var(--text3); font-weight: 600; }
.meisai-summary-value { font-family: 'DM Sans', sans-serif; font-size: 20px; font-weight: 700; color: var(--accent); }

/* ===== LOGIN ===== */
#login-screen { position: fixed; inset: 0; background: var(--sidebar); display: flex; align-items: center; justify-content: center; z-index: 9999; }
#login-screen.hidden { display: none; }
.login-card { background: #1e293b; border-radius: 16px; padding: 40px; width: 380px; max-width: 90vw; box-shadow: 0 25px 50px rgba(0,0,0,.3); }
.login-card h1 { color: #e2e8f0; font-size: 20px; margin-bottom: 4px; }
.login-card .sub { color: #94a3b8; font-size: 13px; margin-bottom: 24px; }
.login-card label { display: block; font-size: 12px; font-weight: 600; color: #94a3b8; margin-bottom: 4px; }
.login-card input { width: 100%; padding: 10px 14px; border: 1px solid #334155; border-radius: 8px; background: #0f172a; color: #e2e8f0; font-size: 14px; font-family: inherit; margin-bottom: 14px; }
.login-card input:focus { outline: none; border-color: #3b82f6; }
.login-card .btn-login { width: 100%; padding: 12px; border: none; border-radius: 8px; background: var(--accent); color: #fff; font-size: 14px; font-weight: 700; cursor: pointer; font-family: inherit; }
.login-card .btn-login:hover { background: #1d4ed8; }
.login-card .login-err { color: #fca5a5; font-size: 12px; margin-top: 10px; display: none; }
.login-card .login-logo { text-align: center; margin-bottom: 20px; }
.login-card .login-logo span { font-size: 28px; font-weight: 800; color: var(--accent); font-family: 'DM Sans', sans-serif; }
.login-card .login-logo-sub { font-size: 11px; color: #64748b; letter-spacing: 2px; text-transform: uppercase; margin-top: 4px; }

/* ===== TOAST ===== */
.modal-bg.open { display: flex !important; }
.toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%) translateY(20px); background: #1e293b; color: #fff; padding: 12px 24px; border-radius: 10px; font-size: 13px; font-weight: 500; z-index: 999; opacity: 0; transition: all .3s; box-shadow: 0 8px 24px rgba(0,0,0,.25); }
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

/* ===== LOADING ===== */
#loading-overlay { position: fixed; inset: 0; background: rgba(15,23,42,.85); display: flex; align-items: center; justify-content: center; z-index: 9998; }
#loading-overlay.hidden { display: none; }
.loading-spinner { color: #e2e8f0; font-size: 16px; }

/* ===== HAMBURGER ===== */
.hamburger { display: none; position: fixed; top: 12px; left: 12px; z-index: 60; width: 40px; height: 40px; border-radius: 8px; background: var(--sidebar); color: #fff; border: none; font-size: 20px; cursor: pointer; align-items: center; justify-content: center; box-shadow: 0 2px 8px rgba(0,0,0,.3); }
.sidebar-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.4); z-index: 39; }
.sidebar-overlay.open { display: block; }

/* ===== RESPONSIVE ===== */
@media (max-width: 768px) {
  .hamburger { display: flex; }
  .sidebar { position: fixed; left: -260px; top: 0; bottom: 0; z-index: 40; width: 240px; transition: left .25s ease; }
  .sidebar.open { left: 0; }
  .layout { flex-direction: column; }
  .page-header { padding: 12px 14px 12px 56px; flex-wrap: wrap; gap: 8px; }
  .page-title { font-size: 15px; }
  .stats-grid { grid-template-columns: 1fr 1fr; padding: 12px 14px 0; gap: 8px; }
  .stat-value { font-size: 18px; }
  .filter-bar { padding: 8px 14px 0; }
  .search-wrap { min-width: unset; flex: 1 1 100%; }
  .status-scroll { padding: 8px 14px 0; }
  .table-wrap { padding: 8px 14px 14px; }
  .detail-panel { width: 100%; }
  .meisai-card { margin: 12px 14px; }
  .meisai-summary { gap: 16px; }
  .toast { max-width: 90vw; white-space: normal; }
  .login-card { padding: 28px 20px; width: 100%; }
}
@media (max-width: 480px) {
  .stats-grid { grid-template-columns: 1fr 1fr; gap: 6px; }
  .stat-card { padding: 10px 12px; }
  .stat-value { font-size: 16px; }
}
</style>
</head>
<body>

<!-- ===== ログイン画面 ===== -->
<div id="login-screen">
  <div class="login-card">
    <div class="login-logo">
      <span>ANKEN MGR</span>
      <div class="login-logo-sub">代理店ポータル</div>
    </div>
    <h1>代理店ログイン</h1>
    <p class="sub">代理店番号とパスワードでログインしてください</p>
    <label>代理店番号</label>
    <input type="text" id="login-agent-no" placeholder="ユーザー名" autofocus>
    <label>パスワード</label>
    <input type="password" id="login-pass" placeholder="パスワード" onkeydown="if(event.key==='Enter')doAgentLogin()">
    <button class="btn-login" onclick="doAgentLogin()">ログイン</button>
    <div class="login-err" id="login-err"></div>
  </div>
</div>

<!-- ===== ローディング ===== -->
<div id="loading-overlay" class="hidden">
  <div class="loading-spinner">⏳ データ読み込み中...</div>
</div>

<div class="layout" id="app-layout" style="display:none;">

<!-- ハンバーガー -->
<button class="hamburger" id="hamburger-btn" onclick="toggleMobileSidebar()">☰</button>
<div class="sidebar-overlay" id="sidebar-overlay" onclick="closeMobileSidebar()"></div>

<!-- ===== SIDEBAR ===== -->
<div class="sidebar">
  <div class="logo">
    <div class="logo-mark">代理店ポータル</div>
    <div class="logo-name">ANKEN MGR</div>
    <div class="logo-ver">Agent Portal v1.0</div>
  </div>
  <nav class="nav">
    <div class="nav-section">メニュー</div>
    <div class="nav-item active" onclick="showPage('anken')"><span class="nav-icon">📋</span>案件一覧</div>
    <div class="nav-item" onclick="showPage('meisai')"><span class="nav-icon">💰</span>支払手数料</div>
  </nav>
  <div class="sidebar-footer">
    <div class="agent-name" id="agent-name-disp"></div>
    <div class="agent-no" id="agent-no-disp"></div>
    <a href="#" onclick="doAgentLogout();return false;">ログアウト</a>
  </div>
</div>

<!-- ===== MAIN CONTENT ===== -->
<div class="main" id="main">

  <!-- ===== 案件一覧ページ ===== -->
  <div id="page-anken">
    <div class="page-header">
      <div class="page-title">案件<span>一覧</span></div>
      <div class="header-actions">
        <button class="btn btn-ghost btn-sm" onclick="exportAgentCsv()">📤 CSV出力</button>
      </div>
    </div>

    <div class="stats-grid">
      <div class="stat-card blue">
        <div class="stat-label">総案件数</div>
        <div class="stat-value" id="st-total">0</div>
        <div class="stat-sub">御社紹介案件</div>
      </div>
      <div class="stat-card warn">
        <div class="stat-label">進行中</div>
        <div class="stat-value" id="st-active">0</div>
        <div class="stat-sub">対応中の案件</div>
      </div>
      <div class="stat-card green">
        <div class="stat-label">完了</div>
        <div class="stat-value" id="st-done">0</div>
        <div class="stat-sub">完了案件</div>
      </div>
      <div class="stat-card purple">
        <div class="stat-label">今月手数料</div>
        <div class="stat-value" id="st-fee">0</div>
        <div class="stat-sub">万円（税込）</div>
      </div>
    </div>

    <div class="filter-bar">
      <div class="search-wrap">
        <span class="search-icon">🔍</span>
        <input type="text" id="search-input" placeholder="顧客名・提案内容で検索..." oninput="renderAnkenTable()">
      </div>
      <div style="display:flex;align-items:center;gap:8px;">
        <input type="month" id="month-filter" style="padding:6px 10px;border:1px solid var(--border);border-radius:8px;font-size:12px;font-family:inherit;background:var(--bg2);color:var(--text);" onchange="renderAnkenTable()" title="月で絞り込み">
        <button class="btn btn-ghost btn-sm" onclick="document.getElementById('month-filter').value='';renderAnkenTable();" style="padding:5px 8px;font-size:11px;">✕</button>
      </div>
    </div>

    <div class="status-scroll" id="status-chips"></div>

    <div class="table-wrap">
      <div class="table-container">
        <table>
          <thead><tr id="anken-thead"></tr></thead>
          <tbody id="anken-tbody"></tbody>
        </table>
        <div id="anken-empty" class="empty-state" style="display:none;">
          <div class="empty-icon">📭</div>
          <div class="empty-text">該当する案件がありません</div>
        </div>
      </div>
    </div>
  </div>

  <!-- ===== 手数料明細ページ ===== -->
  <div id="page-meisai" style="display:none;">
    <div class="page-header">
      <div class="page-title">💰 支払手数料<span>明細</span></div>
      <div class="header-actions">
        <input type="month" id="meisai-month" style="padding:7px 10px;border:1px solid var(--border);border-radius:8px;font-size:13px;font-family:inherit;background:var(--bg2);color:var(--text);" onchange="renderMeisai()">
        <button class="btn btn-ghost btn-sm" onclick="printMeisai()">🖨 印刷</button>
      </div>
    </div>
    <div id="meisai-dairi-filter"></div>
    <div id="meisai-content"></div>
  </div>

</div><!-- /main -->

<!-- ===== 詳細パネル ===== -->
<div class="detail-panel" id="detail-panel">
  <div class="detail-hd">
    <div class="detail-name" id="detail-title"></div>
    <button class="close-btn" onclick="closeDetail()">✕</button>
  </div>
  <div id="detail-body"></div>
</div>

<!-- ===== 工事指示書モーダル ===== -->
<div class="modal-bg" id="shiji-modal" style="position:fixed;inset:0;background:rgba(15,25,50,.5);z-index:100;align-items:center;justify-content:center;backdrop-filter:blur(3px);display:none;">
  <div style="background:var(--bg2);border-radius:14px;width:700px;max-width:95vw;max-height:90vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.2);">
    <div style="padding:22px 26px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;background:var(--bg2);z-index:1;border-radius:14px 14px 0 0;">
      <div><div style="font-size:17px;font-weight:700;">📋 工事指示書</div><div style="font-size:12px;color:var(--text3);margin-top:2px;">入力内容を確認してPDF出力してください</div></div>
      <button class="close-btn" onclick="closeShijiModal()">×</button>
    </div>
    <div id="shiji-body"></div>
  </div>
</div>

</div><!-- /layout -->

<!-- トースト -->
<div class="toast" id="toast"></div>

<script>
// ============================================================
// 代理店ポータル - JavaScript
// ============================================================

var API_BASE = 'https://script.google.com/macros/s/AKfycbyRqDZVanxjCZ76GEuhCR8t8FTZvLiyG7qQK_Xn52NqVVYwA56kSjqwwLOYVa3N6ASu/exec';

var agentInfo = null;  // { no:'D0051', name:'株式会社トーワリコ', ... }
var authToken = '';
var ankenList = [];
var settingsData = {};
var currentStatusFilter = 'all';

// ===== セッション =====
function saveSession() {
  sessionStorage.setItem('agent_token', authToken);
  sessionStorage.setItem('agent_info', JSON.stringify(agentInfo));
}
function loadSession() {
  authToken = sessionStorage.getItem('agent_token') || '';
  var s = sessionStorage.getItem('agent_info');
  agentInfo = s ? JSON.parse(s) : null;
}

// ===== API =====
async function apiCall(action, params) {
  var body = Object.assign({ action: action, token: authToken }, params || {});
  var res = await fetch(API_BASE, {
    method: 'POST',
    headers: { 'Content-Type': 'text/plain;charset=utf-8' },
    body: JSON.stringify(body),
    redirect: 'follow'
  });
  return await res.json();
}

// ===== ログイン =====
async function doAgentLogin() {
  var agentNo = document.getElementById('login-agent-no').value.trim();
  var pass = document.getElementById('login-pass').value.trim();
  var errEl = document.getElementById('login-err');
  errEl.style.display = 'none';

  if (!agentNo || !pass) {
    errEl.textContent = '代理店番号とパスワードを入力してください';
    errEl.style.display = 'block';
    return;
  }

  try {
    var res = await apiCall('login', { username: agentNo, password: pass });
    if (!res.ok) {
      errEl.textContent = res.error || 'ログインに失敗しました';
      errEl.style.display = 'block';
      return;
    }
    // dairiロールか確認
    if (res.user.role !== 'dairi' && res.user.role !== 'dairiAdmin') {
      errEl.textContent = 'この画面は代理店専用です';
      errEl.style.display = 'block';
      return;
    }
    authToken = res.token;
    agentInfo = {
      no: res.user.dairiNo || agentNo,
      name: res.user.tantoName || agentNo,
      role: res.user.role
    };
    saveSession();
    await initAgentApp();
  } catch (e) {
    errEl.textContent = '通信エラー: ' + e.message;
    errEl.style.display = 'block';
  }
}

function doAgentLogout() {
  sessionStorage.removeItem('agent_token');
  sessionStorage.removeItem('agent_info');
  authToken = '';
  agentInfo = null;
  document.getElementById('login-screen').classList.remove('hidden');
  document.getElementById('app-layout').style.display = 'none';
}

// ===== アプリ初期化 =====
async function initAgentApp() {
  document.getElementById('login-screen').classList.add('hidden');
  document.getElementById('loading-overlay').classList.remove('hidden');

  try {
    var ankenRes = await apiCall('getDairiAnken');
    if (ankenRes.ok) {
      ankenList = ankenRes.data || [];
    }

    var settingsRes = await apiCall('getSettings');
    if (settingsRes.ok && settingsRes.data) {
      settingsData = settingsRes.data;
      var dairiList = settingsData.dairiList || [];
      if (agentInfo.role === 'dairiAdmin') {
        agentInfo.name = '管理者';
        agentInfo.no = 'ADMIN';
      } else {
        var found = dairiList.find(function(d) { return d.no === agentInfo.no; });
        if (found) agentInfo.name = found.name;
      }
    }

    // UI更新
    document.getElementById('agent-name-disp').textContent = agentInfo.name;
    document.getElementById('agent-no-disp').textContent = agentInfo.no;

    // 管理者の場合、代理店フィルターを表示
    if (agentInfo.role === 'dairiAdmin') {
      renderDairiFilter();
      renderMeisaiDairiFilter();
    }

    renderStatusChips();
    renderAnkenTable();

    // 手数料明細のデフォルト月
    var now = new Date();
    document.getElementById('meisai-month').value = now.getFullYear() + '-' + String(now.getMonth()+1).padStart(2,'0');

  } catch (e) {
    alert('データ読み込みエラー: ' + e.message);
  }

  document.getElementById('loading-overlay').classList.add('hidden');
  document.getElementById('app-layout').style.display = '';
}

// ===== ページ切替 =====
function showPage(page) {
  closeMobileSidebar();
  ['anken', 'meisai'].forEach(function(p) {
    document.getElementById('page-'+p).style.display = p === page ? '' : 'none';
  });
  document.querySelectorAll('.nav-item').forEach(function(el, i) {
    el.classList.toggle('active', i === ['anken', 'meisai'].indexOf(page));
  });
  closeDetail();
  if (page === 'meisai') renderMeisai();
}

// ===== ヘルパー =====
function fmt(n) { return n ? Number(n).toLocaleString() : '-'; }
function fmtDate(d) {
  if (!d) return '-';
  var m = String(d).match(/^(\d{4})[-\/](\d{1,2})[-\/](\d{1,2})/);
  if (!m) return String(d);
  return m[1]+'/'+String(m[2]).padStart(2,'0')+'/'+String(m[3]).padStart(2,'0');
}
function fmtYen(n) { return n ? '¥'+Number(n).toLocaleString() : '-'; }

function statusColor(s) {
  if (['受注','入金','精算完了','支払い完了','契約完了','工事完了','処置完了','利用中'].includes(s)) return 'b-green';
  if (['入金予定','本審査依頼中','見積り承認待ち','事前入金待ち','支払い待ち','未入金'].includes(s)) return 'b-yellow';
  if (['工事手配中','工事中','審査中','相談中','処置手配中','処置中','商談中','利用準備中'].includes(s)) return 'b-orange';
  if (['竣工調査待ち','取直し待ち','書類待ち','契約送付済み','ご挨拶'].includes(s)) return 'b-blue';
  if (['キャンセル','お断り','取り外し','停止'].includes(s)) return 'b-red';
  return 'b-gray';
}

function typePill(t) {
  var map = { '工事':'tp-koji 🔨 工事', '保守':'tp-hoshu 🛡 保守', 'そーだん':'tp-sodan 💬 そーだん', 'Stooory':'tp-stooory ⭐ Stooory' };
  var v = map[t] || 'tp-koji '+t;
  var cls = v.split(' ')[0];
  var label = v.slice(cls.length+1);
  return '<span class="type-pill '+cls+'">'+label+'</span>';
}

function showToast(msg) {
  var el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(function() { el.classList.remove('show'); }, 3000);
}

function toggleMobileSidebar() {
  document.querySelector('.sidebar').classList.toggle('open');
  document.getElementById('sidebar-overlay').classList.toggle('open');
}
function closeMobileSidebar() {
  document.querySelector('.sidebar').classList.remove('open');
  document.getElementById('sidebar-overlay').classList.remove('open');
}

// ===== ステータスチップ =====
function renderStatusChips() {
  var statuses = {};
  ankenList.forEach(function(a) {
    if (a.status) statuses[a.status] = (statuses[a.status]||0) + 1;
  });
  var container = document.getElementById('status-chips');
  var html = '<button class="status-chip '+(currentStatusFilter==='all'?'active':'')+'" onclick="setStatusFilter(\'all\')">すべて ('+ankenList.length+')</button>';
  Object.keys(statuses).forEach(function(s) {
    html += '<button class="status-chip '+(currentStatusFilter===s?'active':'')+'" onclick="setStatusFilter(\''+s+'\')">'+s+' ('+statuses[s]+')</button>';
  });
  container.innerHTML = html;
}

function setStatusFilter(s) {
  currentStatusFilter = s;
  renderStatusChips();
  renderAnkenTable();
}

// ===== 案件テーブル =====
var _ankenSortKey = 'juchuDate';
var _ankenSortDir = 'desc';
function toggleAnkenSort(key) {
  if (_ankenSortKey === key) {
    _ankenSortDir = _ankenSortDir === 'asc' ? 'desc' : 'asc';
  } else {
    _ankenSortKey = key;
    _ankenSortDir = 'asc';
  }
  renderAnkenTable();
}
function renderAnkenTable() {
  var q = (document.getElementById('search-input').value || '').toLowerCase();
  var monthFilter = document.getElementById('month-filter').value || '';

  var filtered = ankenList.filter(function(a) {
    var matchStatus = currentStatusFilter === 'all' || a.status === currentStatusFilter;
    var matchQ = !q || (a.kokyaku||'').toLowerCase().includes(q) || (a.teianContent||'').toLowerCase().includes(q) || (a.content||'').toLowerCase().includes(q);
    var matchMonth = !monthFilter || (a.juchuDate||'').startsWith(monthFilter) || (a.tsuki||'').startsWith(monthFilter);
    // 管理者の代理店フィルター
    var matchDairi = !_adminDairiFilter || (a.dairiNo||'') === _adminDairiFilter || (a.dairiNo2||'') === _adminDairiFilter;
    return matchStatus && matchQ && matchMonth && matchDairi;
  });

  // ソート
  var sortKey = _ankenSortKey || 'juchuDate';
  var sortDir = _ankenSortDir || 'desc';
  filtered.sort(function(a, b) {
    var va = (a[sortKey]||'').toString();
    var vb = (b[sortKey]||'').toString();
    var cmp = va.localeCompare(vb);
    return sortDir === 'desc' ? -cmp : cmp;
  });

  var thead = document.getElementById('anken-thead');
  var tbody = document.getElementById('anken-tbody');

  var isAdmin = agentInfo && agentInfo.role === 'dairiAdmin';
  function sortTh(label, key) {
    var arrow = _ankenSortKey === key ? (_ankenSortDir === 'asc' ? ' ▲' : ' ▼') : '';
    return '<th style="cursor:pointer;user-select:none;" onclick="toggleAnkenSort(\''+key+'\')">'+label+arrow+'</th>';
  }
  thead.innerHTML = sortTh('ステータス','status')
    + (isAdmin ? sortTh('代理店','dairiNo') : '')
    + '<th>種別</th>'
    + '<th>受注日</th>'
    + '<th>顧客名</th>'
    + sortTh('提案内容','teianContent')
    + '<th>手数料</th>'
    + '<th>完工日</th>'
    + '<th>フォルダ</th>';

  if (filtered.length === 0) {
    tbody.innerHTML = '';
    document.getElementById('anken-empty').style.display = '';
  } else {
    document.getElementById('anken-empty').style.display = 'none';
    tbody.innerHTML = filtered.map(function(a) {
      var feeVal = calcAgentFee(a);
      var endDate = a.type === 'Stooory' ? a.kojiStart : (a.kojiKanryo || a.kojiEnd);
      var contentVal = a.type === 'Stooory' ? (a.content||'-') : (a.teianContent||'-');
      var folderLink = a.data ? '<a href="'+a.data+'" target="_blank" style="color:var(--accent);" onclick="event.stopPropagation();">📁</a>' : '-';

      return '<tr onclick="openDetail('+a.id+')">'
        + '<td><span class="badge '+statusColor(a.status)+'">'+(a.status||'-')+'</span></td>'
        + (isAdmin ? '<td class="td-sub">'+(a.dairiNo||'-')+'</td>' : '')
        + '<td>'+typePill(a.type)+'</td>'
        + '<td class="td-date">'+fmtDate(a.juchuDate)+'</td>'
        + '<td class="td-main">'+(a.kokyaku||'-')+'</td>'
        + '<td class="td-sub">'+contentVal+'</td>'
        + '<td class="td-amount" style="color:var(--accent);">'+fmtYen(feeVal)+'</td>'
        + '<td class="td-date">'+fmtDate(endDate)+'</td>'
        + '<td>'+folderLink+'</td>'
        + '</tr>';
    }).join('');
  }

  renderStats(filtered);
}

// ===== 卸値計算 =====
function calcDairiZairyo(a) {
  if (parseFloat(a.dairiZairyo)) return parseFloat(a.dairiZairyo);
  // マスタ卸値をフォールバック
  var dc = getDairiConfig(a.dairiNo || a.dairiNo2);
  if (dc.oroshiZairyo && a.teianContent) {
    var items = (a.teianContent||'').split('・').filter(function(s){return s&&!s.startsWith('その他');});
    var total = items.reduce(function(s,item){return s+(dc.oroshiZairyo[item.trim()]||0);},0);
    if (total > 0) return total;
  }
  return 0;
}

function calcDairiKoji(a) {
  if (parseFloat(a.dairiKoji)) return parseFloat(a.dairiKoji);
  // マスタ卸値をフォールバック
  var dc = getDairiConfig(a.dairiNo || a.dairiNo2);
  if (dc.oroshiKoji && a.kojiContent) {
    var items = (a.kojiContent||'').split('・').filter(function(s){return s&&!s.startsWith('その他');});
    var total = items.reduce(function(s,item){return s+(dc.oroshiKoji[item.trim()]||0);},0);
    if (total > 0) return total;
  }
  return 0;
}

function getOroshiValue(a) {
  return (calcDairiZairyo(a) + calcDairiKoji(a)) || null;
}

// ===== 統計 =====
function renderStats(filtered) {
  var all = filtered || ankenList;
  var ACTIVE = ['受注','工事手配中','工事手配済み','工事中','審査中','本審査依頼中','書類待ち','相談中','処置手配中','処置中','商談中','利用準備中'];
  var DONE = ['入金','精算完了','支払い完了','工事完了','処置完了','契約完了'];
  var now = new Date();
  var ym = now.getFullYear()+'-'+String(now.getMonth()+1).padStart(2,'0');

  document.getElementById('st-total').textContent = ankenList.length;
  document.getElementById('st-active').textContent = ankenList.filter(function(a) { return ACTIVE.includes(a.status); }).length;
  document.getElementById('st-done').textContent = ankenList.filter(function(a) { return DONE.includes(a.status); }).length;

  // 今月手数料（仲介手数料の合計）
  var monthFee = ankenList.filter(function(a) {
    return (a.juchuDate||'').startsWith(ym) || (a.tsuki||'').startsWith(ym);
  }).reduce(function(sum, a) {
    return sum + calcAgentFee(a);
  }, 0);
  document.getElementById('st-fee').textContent = Math.round(monthFee / 10000);
}

// ===== 手数料計算（代理店マスタ設定ベース） =====
function getDairiConfig(dairiNo) {
  var list = (settingsData.dairiList || []);
  var no = dairiNo || (agentInfo ? agentInfo.no : '');
  return list.find(function(d) { return d.no === no; }) || {};
}

function isLoanOrLease(a) {
  var kt = (a.keiyakuType || '').trim();
  return kt === 'リース' || kt === 'ローン';
}

// ===== 月額手数料（パターンD） =====
function isMonthlyFeeTarget(a) {
  var teian = (a.teianContent || a.content || '').trim();
  var keiyaku = (a.keiyakuType || '').trim();
  var st = (a.status || '').trim();
  // 精算完了・キャンセルは除外
  if (st === '精算完了' || st === 'キャンセル') return false;
  var isDenbreRen = teian.indexOf('電ブレ') >= 0 && keiyaku === 'レンタル';
  var isHoshu = teian.indexOf('保守') >= 0 || st === '保守実施中' || st === '保守契約初回';
  return isDenbreRen || isHoshu;
}

function calcMonthlyFee(a, dc) {
  if (!isMonthlyFeeTarget(a)) return 0;
  var monthly = parseFloat(a.monthly) || 0;
  var rate = (dc && dc.monthlyFeeRate || 0) / 100;
  return Math.round(monthly * rate);
}

function getMonthlyAnken(ym) {
  return ankenList.filter(function(a) {
    if (!isMonthlyFeeTarget(a)) return false;
    var nyukin = (a.buai || a.nyukinDate || '').substring(0, 7);
    if (!nyukin) return false;
    var matchDairi = !_meisaiDairiFilter || (a.dairiNo||'') === _meisaiDairiFilter || (a.dairiNo2||'') === _meisaiDairiFilter;
    return ym >= nyukin && matchDairi;
  });
}

// ===== 信販手数料計算（共通） =====
function calcShinpan(a, dc) {
  // 手入力されていればそちらを優先（0も有効値として扱う）
  if (a.shinpan !== '' && a.shinpan !== undefined && a.shinpan !== null && !isNaN(parseFloat(a.shinpan))) {
    return parseFloat(a.shinpan);
  }
  // 自動計算はローン・リースのみ
  if (!isLoanOrLease(a)) return 0;
  var price = parseFloat(a.price) || 0;
  var shinpanRate = (dc && dc.shinpanRate || 0) / 100;
  return Math.round(550 + price * shinpanRate);
}

function calcAgentFee(a) {
  // 仲介手数料が手入力されていればそれを優先
  var chukai = parseFloat(a.chukai) || 0;
  if (chukai) return chukai;

  // 代理店設定を取得（案件のdairiNoから）
  var dc = getDairiConfig(a.dairiNo || a.dairiNo2);
  if (!dc.feeType || !dc.feeRate) {
    return parseFloat(a.ripuArari) || 0;
  }

  var price = parseFloat(a.price) || 0;
  var zaiko = calcDairiZairyo(a) + calcDairiKoji(a);
  var kotsu = parseFloat(a.dairiKotsu) || 0;
  var shinpan = calcShinpan(a, dc);
  var rate = (dc.feeRate || 0) / 100;

  switch (dc.feeType) {
    case 'arari':
      // パターンA: (物件価格 - 材工 - 交通費) × 率
      return Math.round((price - zaiko - kotsu) * rate);

    case 'uriage':
      // パターンB: 物件価格 × 率
      return Math.round(price * rate);

    case 'keisan':
      // パターンC: (物件価格 - 材工 - 信販手数料 - 交通費) × 率
      return Math.round((price - zaiko - shinpan - kotsu) * rate);

    default:
      return 0;
  }
}

// ===== 案件詳細 =====
function openDetail(id) {
  var a = ankenList.find(function(x) { return x.id === id; });
  if (!a) return;

  document.getElementById('detail-title').textContent = a.kokyaku || '案件詳細';

  var oroshi = getOroshiValue(a);
  var fee = calcAgentFee(a);

  var html = '';

  // 指示書ボタン（社内と同じ：上部に配置）
  html += '<div style="padding:10px 22px;display:flex;gap:8px;">';
  html += '<button class="btn" style="background:var(--bg3);color:var(--text);font-size:12px;padding:6px 14px;" onclick="openShijiModal('+a.id+')">📋 指示書</button>';
  html += '</div>';

  // 基本情報
  html += '<div class="detail-section"><div class="detail-section-title">📋 基本情報</div><div class="detail-grid">';
  html += detailItem('種別', typePill(a.type));
  html += detailItem('ステータス', '<span class="badge '+statusColor(a.status)+'">'+(a.status||'-')+'</span>');
  html += detailItem('受注日', fmtDate(a.juchuDate));
  html += detailItem('月', fmtDate(a.tsuki));
  html += detailItem('顧客名', a.kokyaku || '-', true);
  html += detailItem('代表者', a.rep || '-');
  html += detailItem('電話', a.tel || '-');
  html += '</div></div>';

  // 設備・提案情報
  html += '<div class="detail-section"><div class="detail-section-title">⚡ 設備・提案情報</div><div class="detail-grid">';
  html += detailItem('提案内容', a.teianContent || a.content || '-', true);
  html += detailItem('個数', a.teianCount || '-');
  html += detailItem('契約種別', a.keiyakuType || '-');
  html += detailItem('期間', a.period || '-');
  html += detailItem('月額（税込）', fmtYen(a.monthly));
  html += detailItem('電力会社', a.denryoku || '-');
  html += detailItem('契約容量', a.yoyoCapacity || '-');
  html += detailItem('提案容量', a.teianKw || '-');
  html += '</div></div>';

  // 工事情報
  html += '<div class="detail-section"><div class="detail-section-title">🔨 工事情報</div><div class="detail-grid">';
  html += detailItem('設置先', a.setchiShop || '-', true);
  html += detailItem('設置先住所', a.kojiAddr || '-', true);
  html += detailItem('工事開始日', fmtDate(a.kojiStart));
  html += detailItem('完工日', fmtDate(a.kojiKanryo || a.kojiEnd));
  html += detailItem('工事内容', a.kojiContent || '-', true);
  html += '</div></div>';

  // 費用情報（代理店卸値ベース）
  var priceNum = parseFloat(a.price) || 0;
  var dZairyo = calcDairiZairyo(a);
  var dKoji = calcDairiKoji(a);
  var dKotsu = parseFloat(a.dairiKotsu) || 0;
  var zaikoVal = dZairyo + dKoji;
  var dc = getDairiConfig(a.dairiNo || a.dairiNo2);
  var shinpanVal = calcShinpan(a, dc);
  var arariVal = priceNum > 0 ? Math.round(priceNum - zaikoVal) : 0;
  var keisanVal = priceNum > 0 ? Math.round(priceNum - zaikoVal - shinpanVal - dKotsu) : 0;
  var feeVal = calcAgentFee(a);
  var isUriage = dc.feeType === 'uriage';
  // keisanのみ信販・計算対象を表示、urirageは信販のみ表示（粗利・材工は非表示）
  var showShinpan = dc.feeType === 'keisan' || !dc.feeType;
  var showZaiko   = !isUriage;
  var showArari   = !isUriage;

  html += '<div class="detail-section"><div class="detail-section-title">💰 費用情報</div><div class="detail-grid">';
  html += detailItem('物件価格（税込）', fmtYen(a.price));
  if(showShinpan || isUriage) html += detailItem('信販など手数料', shinpanVal ? fmtYen(shinpanVal) : '-');
  if(showZaiko) html += detailItem('材料費（卸値）', fmtYen(dZairyo));

function generateShijiPdf() {
  var d = _getShijiFormData();
  var rows = _getShijiKadoRows();
  var kDateDisp = '';
  if (d.keiyakuDate) { var p=d.keiyakuDate.split('-'); kDateDisp=p[0]+'年 '+parseInt(p[1])+'月 '+parseInt(p[2])+'日'; }
  var kwDisp = (d.yoyoCapacity && d.teianKw) ? d.yoyoCapacity+' → '+d.teianKw : (d.yoyoCapacity||d.teianKw||'');
  var maxKado = Math.max(rows.length,6); if(maxKado>13) maxKado=13;
  var kadoHtml = '';
  for (var i=0;i<maxKado;i++) { var r=rows[i]||{}; kadoHtml+='<tr style="height:20px;"><td class="c" colspan="1">'+(i+1)+'</td><td colspan="3">'+(r.name||'')+'</td><td class="c" colspan="1">'+(r.qty||'')+'</td><td class="c" colspan="1">'+(r.amp||'')+'</td><td colspan="2">'+(r.time||'')+'</td><td colspan="4">'+(r.note||'')+'</td></tr>'; }
  var bikoHtml = (d.biko||'').replace(/\n/g,'<br>');
  var kojiKibouHtml = (d.kojiKibou||'').replace(/\n/g,'<br>');
  var dcsUnits = (d.ac==='有り') ? _getDcsData() : [];
  var dcsHtml = '';
  if (dcsUnits.length>0) {
    dcsHtml='<table style="margin-top:4px;"><colgroup><col><col><col><col><col><col><col><col><col><col><col><col></colgroup>';
    dcsHtml+='<tr><td class="lb" colspan="12" style="font-size:10px;">DCS取付情報</td></tr>';
    for (var di=0;di<dcsUnits.length;di++) { var u=dcsUnits[di]; dcsHtml+='<tr><td class="lb" colspan="3">（'+(di+1)+'台目）メーカー</td><td colspan="3">'+u.maker+'</td><td class="lb" colspan="2">圧縮機出力</td><td class="c" colspan="2">'+u.outputKw+(u.outputKw?' kW':'')+'</td><td class="c" colspan="2">'+u.outputA+(u.outputA?' A':'')+'</td></tr>'; dcsHtml+='<tr><td class="lb" colspan="3">型番/室外機コネクタ</td><td colspan="9">'+u.model+'</td></tr>'; dcsHtml+='<tr><td class="lb" colspan="3">室内機の場所</td><td colspan="3">'+u.indoor+'</td><td class="lb" colspan="3">室外機の場所</td><td colspan="3">'+u.outdoor+'</td></tr>'; }

function renderMonthlyChart(currentYm) {
  var months = [];
  var d = new Date(currentYm + '-01');
  for (var i = 5; i >= 0; i--) {
    var md = new Date(d.getFullYear(), d.getMonth() - i, 1);
    months.push(md.getFullYear() + '-' + String(md.getMonth()+1).padStart(2,'0'));
  }

  var data = months.map(function(ym) {
    var fee = ankenList.filter(function(a) {
      return (a.buai||'').substring(0,7) === ym;
    }).reduce(function(sum, a) { return sum + calcAgentFee(a); }, 0);
    // 月額手数料も加算
    var mAnken = getMonthlyAnken(ym);
    var mFee = mAnken.reduce(function(s, a) {
      var dcC = getDairiConfig(a.dairiNo || a.dairiNo2);
      return s + calcMonthlyFee(a, dcC);
    }, 0);
    return { ym: ym, fee: fee + mFee };
  });

  var maxFee = Math.max.apply(null, data.map(function(d) { return d.fee; })) || 1;

  var html = '<div style="display:flex;align-items:flex-end;gap:12px;height:140px;">';
  data.forEach(function(d) {
    var h = Math.max(4, (d.fee / maxFee) * 120);
    var parts = d.ym.split('-');
    var label = parseInt(parts[1]) + '月';
    var isCurrent = d.ym === currentYm;
    html += '<div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;height:100%;justify-content:flex-end;">';
    html += '<div style="font-size:11px;font-weight:600;color:'+(isCurrent?'var(--accent)':'var(--text3)')+';">¥'+(d.fee/10000).toFixed(0)+'万</div>';
    html += '<div style="width:100%;height:'+h+'px;background:'+(isCurrent?'var(--accent)':'#dbeafe')+';border-radius:4px 4px 0 0;transition:height .5s;"></div>';
    html += '<div style="font-size:10px;color:var(--text3);font-weight:'+(isCurrent?'700':'400')+';">'+label+'</div>';
    html += '</div>';
  });
  html += '</div>';
  return html;
}

  var html = '<!DOCTYPE html><html><head><meta charset="UTF-8"><title>支払手数料明細</title>'
    + '<style>'
    + '@page{size:landscape;margin:10mm;}'
    + 'body{font-family:"Hiragino Kaku Gothic Pro","Meiryo",sans-serif;font-size:8px;color:#222;margin:0;padding:0;}'

    + 'td{padding:3px;border:1px solid #ddd;font-size:8px;white-space:nowrap;}'
    + '</style></head><body>'
    + '<div class="header">'

    + '<div class="info"><b>'+agentInfo.no+' '+(agentInfo.name||'')+'</b><br>対象月: '+dispMonth+'<br>手数料総額: <b>¥'+pGrandTotal.toLocaleString()+'</b></div>'
    + '</div>'
    + '<div class="summary">'
    + '<div>対象月: <b>'+dispMonth+'</b></div>'
    + '<div>一括手数料: <b style="color:#2563eb;">¥'+totalFee.toLocaleString()+'</b></div>'
    + (pMonthlyFee > 0 ? '<div>月額手数料: <b style="color:#7c3aed;">¥'+pMonthlyFee.toLocaleString()+'</b></div>' : '')

  var win = window.open('','_blank','width=1200,height=800');

    wrap.innerHTML = '<span style="font-size:12px;font-weight:700;color:#92400e;">👑 管理者モード</span>'
      + '<select id="admin-dairi-sel" onchange="filterByDairi()" style="padding:6px 10px;border:1px solid #d97706;border-radius:6px;font-size:12px;background:#fff;min-width:200px;">'
      + '<option value="">すべての代理店</option>'
      + dairiList.map(function(d){return '<option value="'+d.no+'">'+d.no+' '+d.name+'</option>';}).join('')
      + '</select>';

// 管理者用：案件の代理店設定を取得
function getDairiForAnken(a) {
  var no = a.dairiNo || a.dairiNo2 || '';
  var list = (settingsData.dairiList || []);
  return list.find(function(d){return d.no === no;}) || {};
}

// ===== 卸値保存（管理者用） =====
async function saveDairiOroshi(ankenId) {
  var dz = document.getElementById('edit-dairiZairyo');
  var dk = document.getElementById('edit-dairiKoji');
  var dt = document.getElementById('edit-dairiKotsu');
  var ds = document.getElementById('edit-shinpan');
  if (!dz || !dk) return;

  try {
    var sendData = {
      id: ankenId,
      dairiZairyo: Number(dz.value) || 0,
      dairiKoji: Number(dk.value) || 0,
      dairiKotsu: Number(dt.value) || 0
    };
    if (ds) sendData.shinpan = Number(ds.value) || 0;
    var res = await apiCall('saveDairiOroshi', { data: sendData });
    if (res.ok) {
      var a = ankenList.find(function(x){return x.id == ankenId;});
      if (a) {
        a.dairiZairyo = Number(dz.value) || 0;
        a.dairiKoji = Number(dk.value) || 0;
        a.dairiKotsu = Number(dt.value) || 0;
        if (ds) a.shinpan = Number(ds.value) || 0;
      }
      showToast('✅ 卸値を保存しました');
      renderAnkenTable();
      openDetail(ankenId); // 再描画
    } else {
      showToast('❌ ' + (res.error || '保存エラー'));
    }
  } catch(e) {
    showToast('❌ 通信エラー: ' + e.message);
  }
}

function exportAgentCsv() {
  var csv = '\uFEFF受注日,顧客名,種別,ステータス,契約種別,提案内容,卸値,手数料,完工日\n';
  ankenList.forEach(function(a) {
    var oroshi = getOroshiValue(a) || '';
    var fee = calcAgentFee(a) || '';
    var endDate = a.kojiKanryo || a.kojiEnd || '';
    csv += [
      a.juchuDate||'', a.kokyaku||'', a.type||'', a.status||'',
      a.keiyakuType||'', a.teianContent||a.content||'',
      oroshi, fee, endDate
    ].map(function(v) { return '"'+String(v).replace(/"/g,'""')+'"'; }).join(',') + '\n';
  });

  var blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
  var url = URL.createObjectURL(blob);
  var link = document.createElement('a');
  link.href = url;
  link.download = '代理店案件_' + (agentInfo ? agentInfo.no : '') + '_' + new Date().toISOString().slice(0,10) + '.csv';
  link.click();
  URL.revokeObjectURL(url);
  showToast('📤 CSVを出力しました');
}
